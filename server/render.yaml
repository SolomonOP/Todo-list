services:
  - type: web
    name: taskmaster-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        fromDatabase:
          name: taskmaster-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://your-frontend.vercel.app
      - key: PORT
        value: 10000

databases:
  - name: taskmaster-db
    databaseName: taskmaster
    user: taskmaster_user